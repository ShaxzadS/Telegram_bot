name: Deploy Telegram Bot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/Telegram_bot
            git pull origin main

            sudo docker build -t shaxzadbot .

            sudo docker stop shaxzadbot || true
            sudo docker rm shaxzadbot || true

            sudo docker run -d \
              --name shaxzadbot \
              --restart unless-stopped \
              -e BOT_NAME="${{ secrets.BOT_NAME }}" \
              -e BOT_KEY="${{ secrets.BOT_KEY }}" \
              shaxzadbot